<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>天天新鲜 家常菜谱 · 东方超市</title>
<meta name="description" content="天天新鲜 家常菜谱 · 东方超市——今晚吃什么不用愁，看看用店里的新鲜食材能做什么、怎么做。">
<link rel="icon" href="/favicon.ico?v=1" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=1">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=1">
<link rel="stylesheet" href="css/app.css?v=16">
</head>
<body>
<header class="hdr">
  <div class="hdr__top">
    <a id="logoHome" class="hdr__logobtn" href="https://easternmarket.ca" aria-label="东方超市 · 进入主网首页">
      <img class="hdr__logo" src="assets/logo-horizontal.png?v=1" alt="东方超市 Eastern Market" width="1080" height="556">
    </a>
    <h1 class="hdr__name">天天新鲜 家常菜谱</h1>
    <div class="search">
      <input id="q" class="search__input" type="search" inputmode="search"
             aria-label="搜索菜谱或食材"
             placeholder="🔍 搜菜 / 食材" autocomplete="off">
    </div>
  </div>
</header>
<main>
  <section id="home" class="home">
    <div class="block">
      <div class="block__hd">
        <h2 class="block__title">🔥 今晚吃什么</h2>
        <button class="link-btn seeall" data-sec="tonight">查看全部 ›</button>
      </div>
      <div id="picks" class="cards cards--row"></div>
    </div>
    <div class="block" id="cantoneseBlock">
      <div class="block__hd"><h2 class="block__title">🥢 粤菜 · 广式</h2><button class="link-btn seeall" data-sec="cantonese">查看全部 ›</button></div>
      <div id="cantonese" class="cards cards--row"></div>
    </div>
    <div class="block" id="vegBlock">
      <div class="block__hd"><h2 class="block__title">🥗 家常蔬菜</h2><button class="link-btn seeall" data-sec="veg">查看全部 ›</button></div>
      <p class="block__note">用当季新鲜蔬菜，简单几步就上桌</p>
      <div id="veg" class="cards cards--row"></div>
    </div>
    <div class="block" id="seafoodBlock">
      <div class="block__hd"><h2 class="block__title">🐟 海鲜河鲜</h2><button class="link-btn seeall" data-sec="seafood">查看全部 ›</button></div>
      <div id="seafood" class="cards cards--row"></div>
    </div>
    <div class="block" id="freshBlock">
      <div class="block__hd"><h2 class="block__title">🍜 鲜河粉 · 鲜肠粉</h2><button class="link-btn seeall" data-sec="fresh">查看全部 ›</button></div>
      <p class="block__note">🚚 每周四到货 · 周五、六最新鲜　|　好吃不会做？跟着做就行</p>
      <div id="fresh" class="cards cards--row"></div>
    </div>
    <div class="block" id="breakfastBlock">
      <div class="block__hd"><h2 class="block__title">🌅 早餐包点</h2><button class="link-btn seeall" data-sec="breakfast">查看全部 ›</button></div>
      <p class="block__note">蒸一蒸 / 煎一煎就能吃 · 本店有售</p>
      <div id="breakfast" class="cards cards--row"></div>
    </div>
    <div class="block" id="stapleBlock">
      <div class="block__hd"><h2 class="block__title">🍚 主食 · 面饭</h2><button class="link-btn seeall" data-sec="staple">查看全部 ›</button></div>
      <div id="staple" class="cards cards--row"></div>
    </div>
    <div class="block" id="dumplingBlock">
      <div class="block__hd"><h2 class="block__title">🥟 饺子 · 馄饨</h2><button class="link-btn seeall" data-sec="dumpling">查看全部 ›</button></div>
      <p class="block__note">本店有售，煮一煮就上桌</p>
      <div id="dumpling" class="cards cards--row"></div>
    </div>
    <div class="block">
      <h2 class="block__title">🥬 家里有这些？看看能做什么</h2>
      <div id="chips" class="chips"></div>
    </div>
    <div class="block" id="favesBlock" hidden>
      <h2 class="block__title">♥ 我想做的</h2>
      <div id="faves" class="cards cards--row"></div>
    </div>
  </section>
  <section id="results" class="results" hidden aria-live="polite"></section>
  <section id="detail" class="detail" hidden></section>
</main>
<footer class="ftr">以店内实际供应为准 · Eastern Market 东方超市<br>菜谱图片仅供参考</footer>

<script src="js/lib/recipe-logic.js?v=1"></script>
<script src="js/app.js?v=8"></script>
</body>
</html>
